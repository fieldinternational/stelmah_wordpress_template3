  ];

  const catLabels = {
    keychain:'アクリルキーホルダー', stand:'アクリルスタンド', block:'アクリルブロック',
    compare:'サービス比較', guide:'デザインガイド', howto:'入稿ノウハウ'
  };
  const tagLabels = {
    beginner:'初心者向け', template:'テンプレート', doujin:'同人グッズ',
    novelty:'ノベルティ', oshi:'推し活', design:'デザイン'
  };

  /* ── Get article ID from URL ── */
  const params = new URLSearchParams(window.location.search);
  const articleId = parseInt(params.get('id')) || 1;
  const article = articles.find(a => a.id === articleId) || articles[0];

  /* ── Render Article Header ── */
  const headerEl = document.getElementById('articleHeader');
  const breadcrumbEl = document.getElementById('breadcrumbTitle');
  breadcrumbEl.textContent = article.title.length > 20 ? article.title.substring(0, 20) + '...' : article.title;

  headerEl.innerHTML = `
    <div class="flex flex-wrap items-center gap-3 mb-4">
      <span class="font-mono text-xs tracking-widest text-gray-400">${article.date}</span>
      <a href="articles.html?cat=${article.cat}" class="font-mono text-[11px] tracking-widest px-4 py-1.5 rounded-full bg-neon-pink/15 text-neon-pink border border-neon-pink/30 hover:bg-neon-pink/25 transition">
        <i class="fa-solid fa-folder text-[9px] mr-1"></i>${catLabels[article.cat]}
      </a>
    </div>
    <h1 class="text-3xl md:text-4xl font-black tracking-tight leading-tight">${article.title}</h1>
    <p class="text-gray-300 mt-5 leading-relaxed">${article.excerpt}</p>
    <div class="flex flex-wrap gap-2 mt-5">
      ${article.tags.map(t => `
        <a href="articles.html?tag=${t}" class="detail-tag">
          <i class="fa-solid fa-hashtag text-[9px] text-neon-pink/60"></i>${tagLabels[t] || t}
        </a>
      `).join('')}
    </div>
  `;

  /* ── Render Hero Image ── */
  const heroFigure = document.getElementById('articleHeroFigure');
  heroFigure.innerHTML = `<img src="${article.img}" alt="${article.title}" class="w-full h-72 md:h-96 object-cover opacity-90" />`;

  /* ── Render Article Body ── */
  const bodyEl = document.getElementById('articleBody');
  bodyEl.innerHTML = `
    <div class="text-gray-200 space-y-4">${article.body}</div>
    <div class="mt-10 rounded-2xl border border-white/10 bg-black/30 p-6">
      <p class="font-mono text-xs tracking-widest text-gray-400">NOTE</p>
      <p class="text-gray-200 mt-2">実データ連携前の静的テンプレートです。CMS化する場合は、このカード・本文構造をそのまま流用できます。</p>
    </div>
  `;

  /* ══════════════════════════════════════════════════════
     Related Category Articles (Card Grid Layout)
     ══════════════════════════════════════════════════════ */
  const relatedByCategory = articles
    .filter(a => a.cat === article.cat && a.id !== article.id)
    .slice(0, 3);

  const relatedCatTitle = document.getElementById('relatedCategoryTitle');
  relatedCatTitle.textContent = `${catLabels[article.cat]}の関連コラム`;

  const relatedGrid = document.getElementById('relatedCategoryGrid');
  if(relatedByCategory.length === 0){
    relatedGrid.innerHTML = '<p class="text-white/40 font-mono text-sm col-span-3 text-center py-10">関連カテゴリの記事はありません</p>';
  } else {
    relatedGrid.innerHTML = relatedByCategory.map((a, i) => `
      <a href="articles_detail.html?id=${a.id}" class="related-card fade-in-up" style="animation-delay:${i * 80}ms">
        <img src="${a.img}" alt="${a.title}" loading="lazy"/>
        <div class="rc-body">
          <span class="rc-badge">${catLabels[a.cat]}</span>
          <h3 class="rc-title">${a.title}</h3>
          <div class="flex items-center justify-between mt-2">
            <span class="rc-date">${a.date}</span>
            <span class="font-mono text-[11px] text-neon-pink tracking-wider">READ →</span>
          </div>
        </div>
      </a>
    `).join('');
  }

  /* ══════════════════════════════════════════════════════
     Same Tag Articles (Horizontal List Layout)
     ══════════════════════════════════════════════════════ */
  const relatedByTag = articles
    .filter(a => a.id !== article.id && a.tags.some(t => article.tags.includes(t)))
    .slice(0, 3);

  const sameTagTitle = document.getElementById('sameTagTitle');
  const tagDisplay = article.tags.map(t => `#${tagLabels[t] || t}`).join(' ');
  sameTagTitle.innerHTML = `<span class="text-white">同じタグ</span><span class="text-neon-pink/60 text-lg ml-2">${tagDisplay}</span><span class="text-white"> のコラム</span>`;

  const tagList = document.getElementById('sameTagList');
  if(relatedByTag.length === 0){
    tagList.innerHTML = '<p class="text-white/40 font-mono text-sm text-center py-10">同じタグの記事はありません</p>';
  } else {
    tagList.innerHTML = relatedByTag.map((a, i) => {
      const sharedTags = a.tags.filter(t => article.tags.includes(t));
      return `
        <a href="articles_detail.html?id=${a.id}" class="tag-item fade-in-up" style="animation-delay:${i * 100}ms">
          <span class="ti-num">${String(i + 1).padStart(2, '0')}</span>
          <img src="${a.img}" alt="${a.title}" class="ti-img hidden sm:block" loading="lazy"/>
          <div class="ti-body">
            <h3 class="ti-title">${a.title}</h3>
            <div class="ti-meta">
              ${sharedTags.map(t => `<span class="ti-tag">#${tagLabels[t] || t}</span>`).join('')}
              <span class="ti-date">${a.date}</span>
            </div>
          </div>
          <i class="fa-solid fa-chevron-right ti-arrow"></i>
        </a>
      `;
    }).join('');
  }
});
</script>
</body>
</html>
